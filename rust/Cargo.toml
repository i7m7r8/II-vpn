[package]
name = "rust"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Tor with rustls and PT client (SOCKS)
arti-client = { version = "0.40", default-features = false, features = ["rustls", "tokio", "pt-client"] }
tokio = { version = "1", features = ["rt", "net", "sync", "time"] }
once_cell = "1.19"

# SNI parsing (use default features)
tls-parser = "0.12"
bytes = "1"

# Packet parsing (for VPN)
pnet = "0.35"
etherparse = "0.13"

# JNI
jni = "0.21"
log = "0.4"
env_logger = "0.10"

# Async
futures = "0.3"

# Misc
thiserror = "1"

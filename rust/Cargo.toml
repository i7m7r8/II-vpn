[package]
name = "rust"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Tor with PT client (SOCKS) and tokio runtime
arti-client = { version = "0.40", features = ["pt-client", "tokio"] }
tokio = { version = "1", features = ["full"] }
once_cell = "1.19"

# SNI parsing
tls-parser = "0.12"
bytes = "1"

# Packet parsing (for VPN)
pnet = "0.35"
etherparse = "0.13"

# JNI
jni = "0.21"
log = "0.4"
env_logger = "0.10"

# Async
futures = "0.3"

# Misc
thiserror = "1"

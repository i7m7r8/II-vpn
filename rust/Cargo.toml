[package]
name = "rust"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Tor (use the latest stable version as of early 2025)
arti-client = "0.40"
arti-socks5 = "0.1"
tokio = { version = "1", features = ["full"] }
once_cell = "1.19"

# SNI parsing
tls-parser = "0.12"
bytes = "1"

# Packet parsing (for VPN)
pnet = "0.35"
etherparse = "0.13"
smoltcp = { version = "0.10", features = ["proto-ipv4", "proto-ipv6", "socket-tcp", "medium-ip"] }

# JNI
jni = "0.21"
log = "0.4"
env_logger = "0.10"

# Async
futures = "0.3"

# Misc
thiserror = "1"
